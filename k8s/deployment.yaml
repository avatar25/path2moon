apiVersion: apps/v1
kind: Deployment
metadata:
  name: artemis-trajectory
  labels:
    app: artemis-trajectory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: artemis-trajectory
  template:
    metadata:
      labels:
        app: artemis-trajectory
    spec:
      containers:
        - name: web
          image: ghcr.io/example/artemis-trajectory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: artemis-trajectory
spec:
  selector:
    app: artemis-trajectory
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
